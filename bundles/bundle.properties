# items:

item.fenadis-i01-basic-mass.name = Basic Mass
item.fenadis-i01-basic-mass.description = A soft, extractable resource abundant throughout Fenadis, used for all basic constructions.
item.fenadis-i02-tinium.name = Tinium
item.fenadis-i02-tinium.description = Used as slowing ammunition, resource transport, unit manufacturing and defensive structures. Quite resistant.
item.fenadis-i03-elastic-fiber.name = Elastic Fiber
item.fenadis-i03-elastic-fiber.description = Used in the manufacture of electrical units, structures, and storage. Quite flexible.
item.fenadis-i04-debris.name = Debris
item.fenadis-i04-debris.description = Fragments of other compressed resources can be separated to obtain them.
item.fenadis-i05-crystalia.name = Crystalia
item.fenadis-i05-crystalia.description = Mineral with low levels of radioactivity, used as fragmentation ammunition and liquid storage. Quite brittle.
item.fenadis-i06-lizandri.name = Lizandri
item.fenadis-i06-lizandri.description = An ideal alloy for defensive structures, fluid transport, and reinforcement of some structures. Quite irregular.
item.fenadis-i07-advanced-mass.name = Advanced Mass
item.fenadis-i07-advanced-mass.description = A stronger compound that still retains its moldable properties, used for all advanced structures. Quite dense.
item.fenadis-i08-igneous-crystalia.name = Igneous Crystalia
item.fenadis-i08-igneous-crystalia.description = Extreme heat-infused crystals, used in fragmentation and other resource manufacturing. Very fiery.
item.fenadis-i09-lavago.name = Lagavo
item.fenadis-i09-lagavo.description = An extremely dangerous mineral due to its radioactivity, it is used as a final nuclear fuel for heavy nuclear weapons. Ideal for making various future alloys. Highly radioactive.
item.fenadis-i10-optical-fiber.name = Optical Fiber
item.fenadis-i10-optical-fiber.description = Ideal alloy for advanced weaponry, logistics structures, transports, and heavy units. Quite overloaded.
item.fenadis-i11-impure-gold.name = Impure Gold
item.fenadis-i11-impure-gold.description = Gold pieces infected by the harmful properties of Lagavo, have no use until properly purified.
item.fenadis-i12-gold.name = Gold
item.fenadis-i12-gold.description = A very valuable and difficult-to-extract mineral, used for the construction of very special structures. Quite rare.
item.fenadis-i13-complex-mass..name = Complex Mass
item.fenadis-i13-complex-mass.description = A very robust mass, ideal for the construction of very complex structures and special buildings. Very durable.
item.fenadis-i14-otucium.name = Otucium
item.fenadis-i14-otucium.description = Extremely hot and radioactive alloy, used in heavy units and complex munitions. Very robust.
item.fenadis-i15-evolutive-processor.name = Evolutive Processor
item.fenadis-i15-evolutive-processor.description = A logic chip with incredible qualities thanks to the materials it is made of, efficient in ALMOST every possible aspect.
item.fenadis-i16-complex-fiber.name = Complex Fiber
item.fenadis-i16-complex-fiber.description = A valuable resource with extreme processing, used in robust weapons, complex structures, and heavy vehicles. The cause of the disaster.
item.fenadis-i17-supreme-processor.name = Supreme Processor
item.fenadis-i17-supreme-processor.description = A cutting-edge logic chip capable of performing any task thrown at it, the ultimate resource. Highly coveted.

# liquids

liquid.fenadis-l01-yavama.name = Yavama
liquid.fenadis-l01-yavama.description = Viscous liquid, used in structural healing, resource extraction, and very effective at retaining other liquids. Quite sticky.
liquid.fenadis-l02-soro.name = Soro
liquid.fenadis-l02-soro.description = Flammable liquid, used for primitive energy generation, hot ammunition, and can be used as a powerful booster for other resources. Quite unstable.
liquid.fenadis-l03-baruga.name = Baruga
liquid.fenadis-l03-baruga.description = Corrosive liquid, used for unit creation, advanced resource extraction, and stabilizing radioactive resources. Very thick.
liquid.fenadis-l04-explosive-liquid.name = Explosive Liquid
liquid.fenadis-l04-explosive-liquid.description = A highly dangerous synthesized liquid used for advanced weapons and energy reactions. Use under supervised caution.
liquid.fenadis-l05-vilfinium.name = Vilfinium
liquid.fenadis-l05-vilfinium.description = A heavy, dense, radioactive liquid used in the construction of advanced units, advanced weaponry, and responsible energy generation. Quite toxic.
liquid.fenadis-l06-penluya.name = Penluya
liquid.fenadis-l06-penluya.description = Liquefied waste from other resources, it's only useful as an energy refrigerant. Pretty useless.

# drill

block.fenadis-DRA0-basic-drill.name = Basic Drill
block.fenadis-DRA0-basic-drill.description = extracts basic minerals
block.fenadis-DRA1-elastic-drill.name = Elastic Drill
block.fenadis-DRA1-elastic-drill.description = subtly extracts some basic minerals
block.fenadis-DRB0-advanced-drill.name = Advanced Drill
block.fenadis-DRB0-advanced-drill.description = extracts more sophisticated minerals
block.fenadis-DRB1-optical-drill.name = Optical Drill
block.fenadis-DRB1-optical-drill.description = quickly extracts hard minerals
block.fenadis-DRB2-basic-hole-punch.name = Basic Hole Punch
block.fenadis-DRB2-basic-hole-punch.description = extracts some basic minerals from the walls
block.fenadis-DRC0-complex-drill.name = Complex Drill
block.fenadis-DRC0-complex-drill.description = extracts all existing minerals
block.fenadis-DRC1-golden-hole-punch.name = Golden Hole Punch
block.fenadis-DRC1-golden-hole-punch.description = extracts large quantities of complex minerals from the walls

# turrets

block.fenadis-TA0-rookie.name = Rookie
block.fenadis-TA0-rookie.description = Fires standard but varied ammunition.
block.fenadis-TA1-splatter.name = Splatter
block.fenadis-TA1-splatter.description = Fires explosive ammunition that covers a large area.
block.fenadis-TA2-fragmenter.name = Fragmenter
block.fenadis-TA2-fragmenter.description = Fires armor-piercing ammunition over a wide arc.
block.fenadis-TA3-voltage.name = Voltage
block.fenadis-TA3-voltage.description = Charges a powerful electric arc.
block.fenadis-TB0-radiation.name = Radiation
block.fenadis-TB0-radiation.description = It breaks down radioactive materials to release their particles over a wide range of surfaces.
block.fenadis-TB1-optical.name = Optical
block.fenadis-TB1-optical.description = Stores electrical ammo and energy to fire a single-target beam.
block.fenadis-TB2-plasm.name = Plasm
block.fenadis-TB2-plasm.description = Loads a powerful, long-range piercing laser.
block.fenadis-TC0-butcher.name = Butcher
block.fenadis-TC0-butcher.description = Fires a powerful explosive cluster that annihilates all units at great distances, but has the disadvantage of a blind spot.
block.fenadis-TC1-descend.name = Descend
block.fenadis-TC1-descend.description = Fires a vicious burst of anti-aircraft shells.
block.fenadis-TC2-calamity.name = Calamity
block.fenadis-TC2-calamity.description = Uses complex ammunition causing different effects.
block.fenadis-TC3-sprayer.name = Sprayer
block.fenadis-TC3.sprayer.description = Depending on the liquid, it shoots in a different way.
block.fenadis-TC4-punisher.name = Punisher
block.fenadis-TC4-punisher.description = Fires a powerful ground missile.
block.fenadis-TC5-malefic.name = Malefic
block.fenadis-TC5-malefic.description = Fires antimatter projectiles that do a lot of damage.

